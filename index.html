<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geneva GeoGuesser</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f0e;
      --surface: #161a18;
      --card: #1d2320;
      --border: #2a3230;
      --accent: #b6f272;
      --accent2: #72f2b6;
      --text: #e8ede9;
      --muted: #7a8c7d;
      --red: #f27272;
      --yellow: #f2d672;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ---- SCREENS ---- */
    .screen { display: none; width: 100%; height: 100%; }
    .screen.active { display: flex; }

    /* ---- START SCREEN ---- */
    #start-screen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      background: var(--bg);
    }

    .logo-mark {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
    }
    .logo-mark span { color: var(--accent); }

    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .zone-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .zone-btn {
      padding: 0.6rem 1.6rem;
      background: transparent;
      color: var(--muted);
      border: none;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .zone-btn.active {
      background: var(--accent);
      color: #0d0f0e;
      font-weight: 700;
    }

    .start-btn {
      padding: 1rem 3rem;
      background: var(--accent);
      color: #0d0f0e;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: transform 0.15s, opacity 0.15s;
    }
    .start-btn:hover { opacity: 0.85; transform: scale(1.03); }

    .rounds-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ---- GAME SCREEN ---- */
    #game-screen {
      flex-direction: column;
      position: relative;
    }

    #sv-container {
      flex: 1;
      width: 100%;
      position: relative;
    }

    /* ---- HUD ---- */
    .hud {
      position: absolute;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: rgba(13,15,14,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.5rem 1.5rem;
      z-index: 10;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
    }
    .hud-score { color: var(--accent); font-weight: 500; }
    .hud-sep { color: var(--border); }
    .hud-round { color: var(--muted); }

    /* ---- MAP PANEL ---- */
    #map-panel {
      position: absolute;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 300px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      z-index: 20;
      transition: width 0.3s ease, height 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #map-panel:hover {
      width: 420px;
    }
    #map-panel.expanded {
      width: 500px;
    }

    #map-container {
      width: 100%;
      height: 220px;
      transition: height 0.3s ease;
    }
    #map-panel:hover #map-container {
      height: 300px;
    }
    #map-panel.expanded #map-container {
      height: 340px;
    }

    .map-footer {
      padding: 0.75rem 1rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .expand-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      padding: 0.35rem 0.7rem;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      transition: color 0.2s;
    }
    .expand-btn:hover { color: var(--text); }

    .guess-btn {
      flex: 1;
      background: var(--accent);
      color: #0d0f0e;
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.2s;
    }
    .guess-btn.ready { opacity: 1; }
    .guess-btn.ready:hover { opacity: 0.85; }

    /* ---- RESULT SCREEN ---- */
    #result-screen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: var(--bg);
    }

    .result-map-wrap {
      width: min(560px, 90vw);
      height: 300px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .result-score-box {
      text-align: center;
    }
    .result-pts {
      font-size: 3rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -2px;
    }
    .result-dist {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    .result-actions {
      display: flex;
      gap: 0.75rem;
    }
    .next-btn {
      padding: 0.75rem 2.5rem;
      background: var(--accent);
      color: #0d0f0e;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .next-btn:hover { opacity: 0.85; }

    /* ---- FINAL SCREEN ---- */
    #final-screen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.75rem;
      background: var(--bg);
    }

    .final-title {
      font-size: 1rem;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .final-pts {
      font-size: 5rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -4px;
      line-height: 1;
    }
    .final-max {
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .round-summary {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: min(420px, 90vw);
    }
    .round-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
    }
    .round-row-label { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.8rem; }
    .round-row-pts { color: var(--accent); font-weight: 700; }

    .play-again-btn {
      padding: 0.85rem 3rem;
      background: var(--accent);
      color: #0d0f0e;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .play-again-btn:hover { opacity: 0.85; }

    .easy-toggle {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .easy-toggle input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }
    .easy-toggle input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .easy-toggle input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: -1px;
      left: 2px;
      font-size: 12px;
      color: #0d0f0e;
      font-weight: 700;
    }
    .loader-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      font-size: 0.9rem;
      flex-direction: column;
      gap: 1rem;
    }
    .loader-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.2s infinite ease-in-out;
    }
    @keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:1} }


  </style>
</head>
<body>

<!-- ========== START SCREEN ========== -->
<div id="start-screen" class="screen active">
  <div>
    <div class="logo-mark">Geneva<span>.</span><br/>GeoGuesser</div>
  </div>
  <div class="tagline">Know your neighbourhood?</div>

  <div class="zone-toggle">
    <button class="zone-btn active" onclick="selectZone('charmilles', this)">Les Charmilles</button>
    <button class="zone-btn" onclick="selectZone('geneva', this)">All Geneva</button>
  </div>

  <div class="rounds-label">5 rounds · up to 1000 pts each</div>
  <label class="easy-toggle">
    <input type="checkbox" id="easy-mode-checkbox" />
    Easy mode (show hint circle)
  </label>
  <button class="start-btn" onclick="startGame()">Start →</button>
</div>

<!-- ========== GAME SCREEN ========== -->
<div id="game-screen" class="screen">
  <div id="sv-container">
    <div class="loader-overlay" id="sv-loader"><div class="loader-dot"></div>Loading Street View…</div>
  </div>

  <div class="hud">
    <span class="hud-score">Score: <span id="hud-score-val">0</span></span>
    <span class="hud-sep">|</span>
    <span class="hud-round">Round <span id="hud-round-val">1</span>/5</span>
  </div>

  <div id="map-panel">
    <div id="map-container"></div>
    <div class="map-footer">
      <button class="expand-btn" onclick="toggleMap()">⤢</button>
      <button class="guess-btn" id="guess-btn" onclick="submitGuess()">Place your guess</button>
    </div>
  </div>
</div>

<!-- ========== RESULT SCREEN ========== -->
<div id="result-screen" class="screen">
  <div class="result-map-wrap">
    <div id="result-map" style="width:100%;height:100%"></div>
  </div>
  <div class="result-score-box">
    <div class="result-pts" id="result-pts">0</div>
    <div class="result-dist" id="result-dist">— m away</div>
  </div>
  <div class="result-actions">
    <button class="next-btn" id="next-btn" onclick="nextRound()">Next round →</button>
  </div>
</div>

<!-- ========== FINAL SCREEN ========== -->
<div id="final-screen" class="screen">
  <div class="final-title">Final score</div>
  <div class="final-pts" id="final-pts">0</div>
  <div class="final-max">out of 5000</div>
  <div class="round-summary" id="round-summary"></div>
  <button class="play-again-btn" onclick="resetGame()">Play again →</button>
</div>

<!-- ========== MAPS API ========== -->
<script>
  /* ---- CONFIG ---- */
  const API_KEY = 'AIzaSyBrPkaMdcHsp7t-1RbDYzQQXOFYrsEQmb8'; // <-- REPLACE THIS

  // Les Charmilles bounding box (approx 1203 postal code area)
  const ZONES = {
    charmilles: {
      name: 'Les Charmilles',
      points: [
        { lat: 46.2201, lng: 6.1195 },
        { lat: 46.2215, lng: 6.1230 },
        { lat: 46.2189, lng: 6.1260 },
        { lat: 46.2175, lng: 6.1280 },
        { lat: 46.2160, lng: 6.1255 },
        { lat: 46.2165, lng: 6.1210 },
        { lat: 46.2180, lng: 6.1195 },
        { lat: 46.2195, lng: 6.1180 },
        // More variety points within the zone
        { lat: 46.2208, lng: 6.1245 },
        { lat: 46.2172, lng: 6.1237 },
        { lat: 46.2185, lng: 6.1218 },
      ],
      center: { lat: 46.2190, lng: 6.1230 },
      zoom: 14,
    },
    geneva: {
      name: 'Geneva',
      points: [
        { lat: 46.2044, lng: 6.1432 }, // Old Town
        { lat: 46.1906, lng: 6.1673 }, // Carouge
        { lat: 46.2252, lng: 6.0913 }, // Meyrin
        { lat: 46.2143, lng: 6.1559 }, // Eaux-Vives
        { lat: 46.2200, lng: 6.1195 }, // Charmilles
        { lat: 46.1951, lng: 6.1225 }, // Lancy
        { lat: 46.2330, lng: 6.1120 }, // Vernier
        { lat: 46.1990, lng: 6.1450 }, // Plainpalais
        { lat: 46.2090, lng: 6.1320 }, // Saint-Gervais
        { lat: 46.2160, lng: 6.1700 }, // Champel
        { lat: 46.2280, lng: 6.1370 }, // Servette
      ],
      center: { lat: 46.2044, lng: 6.1432 },
      zoom: 12,
    }
  };

  const TOTAL_ROUNDS = 5;
  const MAX_SCORE_PER_ROUND = 1000;
  const MAX_DIST_M = 3000; // distance beyond which score = 0

  /* ---- STATE ---- */
  let currentZone = 'charmilles';
  let round = 0;
  let totalScore = 0;
  let roundScores = [];
  let roundLocations = [];
  let guessMarker = null;
  let guessLatLng = null;
  let panorama = null;
  let guessMap = null;
  let resultMap = null;
  let mapsReady = false;
  let easyMode = false;
  let hintCircle = null;

  /* ---- UTILS ---- */
  function selectZone(zone, btn) {
    currentZone = zone;
    document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function haversineDistance(a, b) {
    const R = 6371000;
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLng = (b.lng - a.lng) * Math.PI / 180;
    const sa = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.asin(Math.sqrt(sa));
  }

  function scoreFromDistance(dist) {
    if (dist >= MAX_DIST_M) return 0;
    return Math.round(MAX_SCORE_PER_ROUND * (1 - dist / MAX_DIST_M));
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  /* ---- MAPS LOADING ---- */
  function loadMapsAPI() {
    return new Promise((resolve) => {
      if (window.google && window.google.maps) { resolve(); return; }
      window.__mapsCallback = resolve;
      const s = document.createElement('script');
      s.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&callback=__mapsCallback`;
      s.async = true;
      document.head.appendChild(s);
    });
  }

  /* ---- FIND VALID STREET VIEW NEAR POINT ---- */
  function findStreetView(latlng) {
    return new Promise((resolve, reject) => {
      const sv = new google.maps.StreetViewService();
      sv.getPanorama({
        location: latlng,
        radius: 200,
        source: google.maps.StreetViewSource.OUTDOOR,
      }, (data, status) => {
        if (status === google.maps.StreetViewStatus.OK) {
          resolve(data.location.latLng);
        } else {
          reject('No street view at this point');
        }
      });
    });
  }

  /* ---- GAME FLOW ---- */
  async function startGame() {
    if (!mapsReady) {
      await loadMapsAPI();
      mapsReady = true;
    }
    easyMode = document.getElementById('easy-mode-checkbox').checked;
    round = 0;
    totalScore = 0;
    roundScores = [];
    const zone = ZONES[currentZone];
    roundLocations = shuffle(zone.points).slice(0, TOTAL_ROUNDS);
    showScreen('game-screen');
    await loadRound();
  }

  async function loadRound() {
    document.getElementById('sv-loader').style.display = 'flex';
    document.getElementById('hud-round-val').textContent = round + 1;
    document.getElementById('hud-score-val').textContent = totalScore;
    guessLatLng = null;
    document.getElementById('guess-btn').classList.remove('ready');

    const target = roundLocations[round];
    let svPos;
    try {
      svPos = await findStreetView(target);
    } catch {
      // Try a fallback location from the zone
      const fallback = ZONES[currentZone].points[(round + 3) % ZONES[currentZone].points.length];
      svPos = await findStreetView(fallback).catch(() => new google.maps.LatLng(target.lat, target.lng));
    }

    // Set up panorama
    if (!panorama) {
      panorama = new google.maps.StreetViewPanorama(
        document.getElementById('sv-container'),
        {
          position: svPos,
          addressControl: false,
          fullscreenControl: false,
          showRoadLabels: false,
          linksControl: true,
          enableCloseButton: false,
          motionTracking: false,
          motionTrackingControl: false,
        }
      );
    } else {
      panorama.setPosition(svPos);
      panorama.setPov({ heading: Math.random() * 360, pitch: 0 });
    }

    // Set up guess map
    const zone = ZONES[currentZone];
    if (!guessMap) {
      guessMap = new google.maps.Map(document.getElementById('map-container'), {
        center: zone.center,
        zoom: zone.zoom,
        disableDefaultUI: true,
        zoomControl: true,
        gestureHandling: 'greedy',
        mapTypeId: 'hybrid',
      });

      guessMap.addListener('click', (e) => {
        placeGuessMarker(e.latLng);
      });

      document.getElementById('map-panel').addEventListener('mouseenter', () => {
        setTimeout(() => google.maps.event.trigger(guessMap, 'resize'), 50);
      });
    } else {
      guessMap.setCenter(zone.center);
      guessMap.setZoom(zone.zoom);
      if (guessMarker) { guessMarker.setMap(null); guessMarker = null; }
      if (hintCircle) { hintCircle.setMap(null); hintCircle = null; }
    }

    // Easy mode: draw a circle roughly around the actual location
    if (easyMode) {
      const target = roundLocations[round];
      // Add random offset up to ~300m so it's a hint, not the exact answer
      const offsetLat = (Math.random() - 0.5) * 0.004;
      const offsetLng = (Math.random() - 0.5) * 0.004;
      hintCircle = new google.maps.Circle({
        center: { lat: target.lat + offsetLat, lng: target.lng + offsetLng },
        radius: 400,
        map: guessMap,
        strokeColor: '#f2d672',
        strokeOpacity: 0.8,
        strokeWeight: 2,
        fillColor: '#f2d672',
        fillOpacity: 0.1,
      });
    }

    document.getElementById('sv-loader').style.display = 'none';
  }

  function placeGuessMarker(latLng) {
    if (guessMarker) guessMarker.setMap(null);
    guessMarker = new google.maps.Marker({
      position: latLng,
      map: guessMap,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 9,
        fillColor: '#b6f272',
        fillOpacity: 1,
        strokeColor: '#0d0f0e',
        strokeWeight: 2,
      }
    });
    guessLatLng = latLng;
    document.getElementById('guess-btn').classList.add('ready');
  }

  function toggleMap() {
    document.getElementById('map-panel').classList.toggle('expanded');
    google.maps.event.trigger(guessMap, 'resize');
  }

  async function submitGuess() {
    if (!guessLatLng) return;

    const target = roundLocations[round];
    const dist = haversineDistance(
      { lat: guessLatLng.lat(), lng: guessLatLng.lng() },
      target
    );
    const pts = scoreFromDistance(dist);
    totalScore += pts;
    roundScores.push({ dist, pts, round: round + 1 });

    showScreen('result-screen');

    // Show result map - always create fresh to avoid stale markers
    document.getElementById('result-map').innerHTML = '';
    resultMap = new google.maps.Map(document.getElementById('result-map'), {
      disableDefaultUI: true,
      gestureHandling: 'none',
      mapTypeId: 'hybrid',
    });

    const bounds = new google.maps.LatLngBounds();
    const tLatLng = new google.maps.LatLng(target.lat, target.lng);
    bounds.extend(tLatLng);
    bounds.extend(guessLatLng);
    resultMap.fitBounds(bounds, 60);

    // Actual location marker
    new google.maps.Marker({
      position: tLatLng,
      map: resultMap,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 11,
        fillColor: '#f27272',
        fillOpacity: 1,
        strokeColor: '#fff',
        strokeWeight: 2,
      }
    });
    // Guess marker
    new google.maps.Marker({
      position: guessLatLng,
      map: resultMap,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 9,
        fillColor: '#b6f272',
        fillOpacity: 1,
        strokeColor: '#0d0f0e',
        strokeWeight: 2,
      }
    });
    // Line between
    new google.maps.Polyline({
      path: [guessLatLng, tLatLng],
      map: resultMap,
      strokeColor: '#ffffff',
      strokeOpacity: 0.5,
      strokeWeight: 2,
    });

    document.getElementById('result-pts').textContent = '+' + pts;
    const distText = dist < 1000
      ? Math.round(dist) + ' m away'
      : (dist / 1000).toFixed(2) + ' km away';
    document.getElementById('result-dist').textContent = distText;

    const isLast = round === TOTAL_ROUNDS - 1;
    document.getElementById('next-btn').textContent = isLast ? 'See results →' : 'Next round →';
  }

  function nextRound() {
    round++;
    if (round >= TOTAL_ROUNDS) {
      showFinal();
    } else {
      showScreen('game-screen');
      // Clean up result map markers by replacing map
      resultMap = null;
      document.getElementById('result-map').innerHTML = '';
      loadRound();
    }
  }

  function showFinal() {
    document.getElementById('final-pts').textContent = totalScore;
    const summary = document.getElementById('round-summary');
    summary.innerHTML = '';
    roundScores.forEach(r => {
      const distText = r.dist < 1000
        ? Math.round(r.dist) + ' m'
        : (r.dist / 1000).toFixed(1) + ' km';
      summary.innerHTML += `
        <div class="round-row">
          <span class="round-row-label">Round ${r.round}</span>
          <span style="color:var(--muted);font-size:0.8rem;font-family:'DM Mono',monospace">${distText} off</span>
          <span class="round-row-pts">+${r.pts}</span>
        </div>`;
    });
    showScreen('final-screen');
  }

  function resetGame() {
    panorama = null;
    guessMap = null;
    resultMap = null;
    guessMarker = null;
    hintCircle = null;
    document.getElementById('sv-container').innerHTML = '<div class="loader-overlay" id="sv-loader"><div class="loader-dot"></div>Loading Street View…</div>';
    document.getElementById('map-container').innerHTML = '';
    document.getElementById('result-map').innerHTML = '';
    showScreen('start-screen');
  }

  /* ---- DARK MAP STYLES ---- */
  function darkMapStyles() {
    return [
      { elementType: 'geometry', stylers: [{ color: '#1d2320' }] },
      { elementType: 'labels.text.stroke', stylers: [{ color: '#1d2320' }] },
      { elementType: 'labels.text.fill', stylers: [{ color: '#7a8c7d' }] },
      { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#2a3230' }] },
      { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#161a18' }] },
      { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0d2020' }] },
      { featureType: 'poi', stylers: [{ visibility: 'off' }] },
      { featureType: 'transit', stylers: [{ visibility: 'off' }] },
    ];
  }
</script>

</body>
